name: v1-quality-gate

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Verify synchronized versions
        run: python scripts/check-versions.py
      - name: Backend tests
        run: python -m pytest -q backend/tests
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend tests
        working-directory: frontend
        run: npm test
      - name: Frontend production build
        working-directory: frontend
        run: npm run build
      - name: Rust check
        run: cargo check --locked --manifest-path frontend/src-tauri/Cargo.toml
      - name: Generate SBOM and license inventory
        run: python scripts/generate-sbom.py
